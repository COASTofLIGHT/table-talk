<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Complete the Sentence — 60</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    height: 100dvh;
    background: #000000;
    overflow: hidden;
  }

  button.stage {
    appearance: none;
    -webkit-appearance: none;
    border: none;
    outline: none;
    background: #000000;
    width: 100%;
    height: 100%;
    height: 100dvh;
    margin: 0;
    padding: 8vw 7vw;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }

  button.stage:focus {
    outline: none;
  }

  .sentence {
    font-family: 'Fraunces', Georgia, serif;
    font-optical-sizing: auto;
    font-weight: 500;
    font-style: normal;
    font-size: clamp(28px, 6vw, 68px);
    line-height: 1.25;
    color: #ffffff;
    letter-spacing: -0.01em;
    max-width: 900px;
    transition: opacity 500ms ease, filter 500ms ease;
    opacity: 1;
    filter: blur(0px);
  }

  .sentence.fading {
    opacity: 0;
    filter: blur(6px);
  }

  .hint {
    position: fixed;
    bottom: 28px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #ffffff;
    opacity: 0.35;
    transition: opacity 1.2s ease;
    pointer-events: none;
  }

  .hint.hidden { opacity: 0; }

  .count {
    position: fixed;
    top: 28px;
    right: 32px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: #ffffff;
    opacity: 0.25;
    pointer-events: none;
  }
</style>
</head>
<body>

<button class="stage" id="stage" aria-label="Show another sentence starter">
  <div class="sentence" id="sentence"></div>
</button>

<div class="hint" id="hint">tap for another</div>
<div class="count" id="count"></div>

<script>
  const sentences = [
    "If only\u2026",
    "My mother\u2026",
    "Men are\u2026",
    "The pain\u2026",
    "I want\u2026",
    "Enough\u2026",
    "I adore\u2026",
    "I'm so grateful\u2026",
    "I wish\u2026",
    "Women are\u2026",
    "The world\u2026",
    "Deep down I\u2026",
    "I am\u2026",
    "The day is\u2026",
    "Only because\u2026",
    "My only\u2026",
    "My father\u2026",
    "The best would be if\u2026",
    "If friends\u2026",
    "The best\u2026",
    "I'm gradually\u2026",
    "At the end of the day, I\u2026",
    "Money\u2026",
    "As I look back, I\u2026",
    "In the darkness, I\u2026",
    "What I really want\u2026",
    "Next time, I would\u2026",
    "My colleagues\u2026",
    "Sex is\u2026",
    "I absolutely don't want to forget\u2026",
    "I don't want\u2026",
    "When it will be all over, I\u2026",
    "Happiness means\u2026",
    "Throughout my life\u2026",
    "My greatest relief\u2026",
    "Behind the social facade\u2026",
    "I'm furious that\u2026",
    "I wish I could go back and correct\u2026",
    "I'm longing to tell\u2026",
    "When it's very quiet I\u2026",
    "I'll never be able to forgive\u2026",
    "In the next decade\u2026",
    "If I didn't worry what people think\u2026",
    "When I can finally\u2026",
    "Stop always\u2026",
    "I want to say sorry\u2026",
    "In my depths, I\u2026",
    "A good life involves\u2026",
    "If I wasn't so scared\u2026",
    "What people don't understand\u2026",
    "It's only normal\u2026",
    "Now is the moment\u2026",
    "When I'm tired\u2026",
    "I'm not really\u2026",
    "I should pay less attention\u2026",
    "The real obstacle\u2026",
    "Underneath everything\u2026",
    "The truth\u2026",
    "When all is said and done\u2026",
    "I can't ever forget\u2026"
  ];

  const sentenceEl = document.getElementById('sentence');
  const hintEl = document.getElementById('hint');
  const countEl = document.getElementById('count');
  const stageEl = document.getElementById('stage');

  let lastIdx = -1;
  let shown = 0;

  function pickIndex(exclude, max) {
    if (max <= 1) return 0;
    let i;
    do { i = Math.floor(Math.random() * max); } while (i === exclude);
    return i;
  }

  function next() {
    const idx = pickIndex(lastIdx, sentences.length);
    lastIdx = idx;
    shown++;

    sentenceEl.classList.add('fading');

    setTimeout(() => {
      sentenceEl.textContent = sentences[idx];
      countEl.textContent = shown + " / " + sentences.length;
      sentenceEl.classList.remove('fading');
    }, 350);

    if (hintEl && !hintEl.classList.contains('hidden')) {
      hintEl.classList.add('hidden');
    }
  }

  (function init() {
    const idx = pickIndex(-1, sentences.length);
    lastIdx = idx;
    shown = 1;
    sentenceEl.textContent = sentences[idx];
    countEl.textContent = shown + " / " + sentences.length;
  })();

  stageEl.addEventListener('click', next);
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      next();
    }
  });
</script>

</body>
</html>
